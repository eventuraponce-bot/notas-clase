<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registro de Participación</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    padding: 30px;
    background-color: #f5f5f5;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    width: 700px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

select, input, button {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

button {
    background-color: #0056b3;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: #003d82;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
}

th {
    background-color: #0056b3;
    color: white;
}
</style>

</head>
<body>

<div class="container">

<h2>Registro de Participación</h2>

<h3>📂 Cargar desde Excel</h3>

<input type="number" id="numAlumnos" placeholder="Número de alumnos">
<input type="file" id="excelFile" accept=".xlsx, .xls">
<button onclick="cargarExcel()">Cargar Excel</button>

<hr>

<h3>Agregar estudiante</h3>
<input type="text" id="nuevoEstudiante" placeholder="Nombre">
<button onclick="agregarEstudiante()">Agregar</button>

<hr>

<h3>Asignar puntaje</h3>

<select id="sesion"></select>
<select id="estudiante"></select>

<select id="nivel">
<option value="">Nivel</option>
<option value="8">8</option>
<option value="6">6</option>
<option value="4">4</option>
<option value="2">2</option>
<option value="0">0</option>
</select>

<button onclick="guardar()">Guardar</button>

<div id="resultado"></div>

<hr>

<h3>📊 Tabla General</h3>
<div id="tablaGeneral"></div>

<button onclick="exportarHTML()">📤 Exportar para alumnos</button>

</div>

<script>

let estudiantes = [];
let registros = {};

// sesiones
for (let i = 1; i <= 7; i++) {
    let option = document.createElement("option");
    option.value = i;
    option.text = "Sesión " + i;
    document.getElementById("sesion").appendChild(option);
}

// agregar
function agregarEstudiante() {
    let nombre = document.getElementById("nuevoEstudiante").value.trim();
    if (!nombre) return alert("Ingrese nombre");

    estudiantes.push(nombre);

    let option = document.createElement("option");
    option.value = nombre;
    option.text = nombre;
    document.getElementById("estudiante").appendChild(option);

    document.getElementById("nuevoEstudiante").value = "";
}

// cargar excel
function cargarExcel() {
    let file = document.getElementById("excelFile").files[0];
    let n = parseInt(document.getElementById("numAlumnos").value);

    if (!file) return alert("Suba archivo");
    if (!n) return alert("Ingrese número");

    let reader = new FileReader();

    reader.onload = function(e) {
        let data = new Uint8Array(e.target.result);
        let wb = XLSX.read(data, { type: 'array' });
        let sheet = wb.Sheets[wb.SheetNames[0]];

        estudiantes = [];
        registros = {};

        document.getElementById("estudiante").innerHTML = "";

        for (let i = 2; i < 2 + n; i++) {
            let c = sheet["E" + i];
            if (c && c.v) {
                let nombre = c.v.toString().trim();
                estudiantes.push(nombre);

                let op = document.createElement("option");
                op.value = nombre;
                op.text = nombre;
                document.getElementById("estudiante").appendChild(op);
            }
        }

        mostrarTablaGeneral();
        alert("Cargado");
    };

    reader.readAsArrayBuffer(file);
}

// guardar
function guardar() {
    let s = document.getElementById("sesion").value;
    let e = document.getElementById("estudiante").value;
    let p = document.getElementById("nivel").value;

    if (!s || !e || p === "") return alert("Complete");

    if (!registros[e]) registros[e] = {};
    registros[e][s] = parseInt(p);

    mostrarResumen(e);
    mostrarTablaGeneral();
}

// resumen
function mostrarResumen(e) {
    let html = "<h4>" + e + "</h4><table><tr><th>S</th><th>P</th></tr>";
    let t = 0;

    for (let s in registros[e]) {
        html += "<tr><td>" + s + "</td><td>" + registros[e][s] + "</td></tr>";
        t += registros[e][s];
    }

    html += "<tr><td>Total</td><td>" + t + "</td></tr></table>";

    document.getElementById("resultado").innerHTML = html;
}

// tabla general
function mostrarTablaGeneral() {
    let html = "<table><tr><th>Estudiante</th>";

    for (let i = 1; i <= 7; i++) html += "<th>S" + i + "</th>";

    html += "<th>Total</th></tr>";

    for (let e of estudiantes) {
        let t = 0;
        html += "<tr><td>" + e + "</td>";

        for (let i = 1; i <= 7; i++) {
            let v = (registros[e] && registros[e][i]) ? registros[e][i] : 0;
            html += "<td>" + v + "</td>";
            t += v;
        }

        html += "<td>" + t + "</td></tr>";
    }

    html += "</table>";
    document.getElementById("tablaGeneral").innerHTML = html;
}

// exportar
function exportarHTML() {

let html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resultados</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#0056b3;color:white}
</style>
</head>
<body>
<h2>Resultados</h2>
<table>
<tr><th>Estudiante</th>`;

for (let i=1;i<=7;i++) html += "<th>S"+i+"</th>";

html += "<th>Total</th></tr>";

for (let e of estudiantes) {
    let t=0;
    html += "<tr><td>"+e+"</td>";

    for (let i=1;i<=7;i++) {
        let v=(registros[e] && registros[e][i])?registros[e][i]:0;
        html += "<td>"+v+"</td>";
        t+=v;
    }

    html += "<td>"+t+"</td></tr>";
}

html += "</table></body></html>";

let blob = new Blob([html], {type:"text/html"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "resultados.html";
a.click();
}

</script>

</body>
</html>
